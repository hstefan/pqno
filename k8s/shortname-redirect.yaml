# Redirects http://pqno/* to https://pqno.lab.hstefan.com/*
# Requires DNS search domain lab.hstefan.com on client devices so that
# bare hostname "pqno" resolves to pqno.lab.hstefan.com -> 192.168.1.110.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-fqdn
  namespace: pqno
spec:
  redirectRegex:
    regex: "^http://pqno(.*)"
    replacement: "https://pqno.lab.hstefan.com${1}"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pqno-shortname
  namespace: pqno
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: pqno-redirect-to-fqdn@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: pqno
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pqno
                port:
                  number: 80
